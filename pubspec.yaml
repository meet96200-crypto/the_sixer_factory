name: the_sixer_factory
description: "The Sixer Factory Cricket App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_messaging: ^16.0.1
  google_sign_in: ^7.1.1

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  url_launcher: ^6.3.1
  provider: ^6.1.5
  google_fonts: ^6.3.1
  carousel_slider: ^5.1.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/banners/
    - assets/teams/
    - assets/icons/
    - assets/images/
    - assets/logos/
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logos/logo.png
  min_sdk_android: 21